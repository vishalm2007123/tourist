<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Incidents — GuardianTrail</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#111827;--ink2:#374151;--muted:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;--white:#fff;--navy:#1e3a5f;--teal:#0d9488;--amber:#d97706;--red:#dc2626;--green:#16a34a;--blue:#2563eb;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:40px 24px;}
.wrap{max-width:900px;margin:0 auto;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;margin-bottom:28px;transition:color 0.2s;}
.back-link:hover{color:var(--navy);}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.page-header h1{font-size:28px;font-weight:900;color:var(--navy);letter-spacing:-1px;}
.page-header p{font-size:14px;color:var(--muted);margin-top:4px;}
.new-btn{padding:11px 20px;background:var(--red);color:white;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;}
.new-btn:hover{background:#b91c1c;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:white;border:1px solid var(--border);border-radius:12px;padding:18px;}
.sc-n{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;margin-bottom:4px;}
.sc-l{font-size:11px;color:var(--muted);}

/* FILTERS */
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:7px 14px;border-radius:999px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:white;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--navy);color:var(--navy);background:#EFF6FF;}
.search-input{margin-left:auto;padding:8px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;width:200px;}
.search-input:focus{border-color:var(--navy);}

/* INCIDENT CARD */
.inc-card{background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s;}
.inc-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-1px);}
.ic-header{padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;}
.ic-type{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.ic-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;}
.ic-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.badge{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;}
.b-active{background:#FEF2F2;color:var(--red);}
.b-investigating{background:#EFF6FF;color:var(--blue);}
.b-resolved{background:#F0FDF4;color:var(--green);}
.sev-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
.sv-high{background:#FEE2E2;color:var(--red);}
.sv-medium{background:#FEF3C7;color:var(--amber);}
.sv-low{background:#DCFCE7;color:var(--green);}

/* EXPAND */
.ic-body{display:none;padding:0 20px 18px;border-top:1px solid var(--border);}
.ic-body.open{display:block;}
.ic-desc{font-size:14px;color:var(--ink2);line-height:1.6;margin:14px 0;}
.ic-chain{background:var(--bg);border-radius:10px;padding:12px 14px;margin-top:12px;}
.ic-chain-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.ic-chain-hash{font-family:'Space Mono',monospace;font-size:11px;color:var(--teal);}
.ic-photo{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-top:12px;}

/* TRACK PROGRESS */
.track-wrap{margin-top:16px;}
.track-steps{display:flex;gap:0;position:relative;}
.track-steps::before{content:'';position:absolute;top:16px;left:0;right:0;height:2px;background:var(--border);z-index:0;}
.ts-step{flex:1;position:relative;z-index:1;text-align:center;}
.ts-circle{width:32px;height:32px;border-radius:50%;background:var(--border);border:3px solid white;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:13px;transition:all 0.3s;}
.ts-label{font-size:10px;font-weight:600;color:var(--muted);}
.ts-step.done .ts-circle{background:var(--green);}
.ts-step.done .ts-label{color:var(--green);}
.ts-step.current .ts-circle{background:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,0.2);animation:step-p 1.5s ease-in-out infinite;}
@keyframes step-p{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.ts-step.current .ts-label{color:var(--blue);font-weight:700;}

/* EMPTY */
.empty{text-align:center;padding:64px 20px;}
.empty-icon{font-size:52px;margin-bottom:16px;}
.empty h3{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.empty p{font-size:14px;color:var(--muted);}

@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr;}.search-input{width:100%;margin-left:0;}}
</style>
</head>
<body>
<div class="wrap">
  <a href="home.html" class="back-link">← Back to Dashboard</a>

  <div class="page-header">
    <div>
      <h1>📋 My Incidents</h1>
      <p>Track every incident you've reported — all blockchain-verified.</p>
    </div>
    <a href="report.html" class="new-btn">🚨 New Report</a>
  </div>

  <div class="stats-row">
    <div class="sc"><div class="sc-n" id="s-total" style="color:var(--navy)">0</div><div class="sc-l">Total Reports</div></div>
    <div class="sc"><div class="sc-n" id="s-active" style="color:var(--red)">0</div><div class="sc-l">Active</div></div>
    <div class="sc"><div class="sc-n" id="s-inv" style="color:var(--blue)">0</div><div class="sc-l">Investigating</div></div>
    <div class="sc"><div class="sc-n" id="s-res" style="color:var(--green)">0</div><div class="sc-l">Resolved</div></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="filter('all',this)">All</button>
    <button class="filter-btn" onclick="filter('Active',this)">🔴 Active</button>
    <button class="filter-btn" onclick="filter('Investigating',this)">🔵 Investigating</button>
    <button class="filter-btn" onclick="filter('Resolved',this)">🟢 Resolved</button>
    <input type="text" class="search-input" id="searchInput" placeholder="Search incidents..." oninput="doSearch(this.value)">
  </div>

  <div id="incidentList"></div>
</div>

<script>
const name = localStorage.getItem('tourist_name') || 'Tourist';
let allIncidents = (JSON.parse(localStorage.getItem('incidents')) || []).filter(i => i.tourist === name);
let currentFilter = 'all';
let searchTerm = '';

document.getElementById('s-total').textContent = allIncidents.length;
document.getElementById('s-active').textContent = allIncidents.filter(i=>i.status==='Active').length;
document.getElementById('s-inv').textContent = allIncidents.filter(i=>i.status==='Investigating').length;
document.getElementById('s-res').textContent = allIncidents.filter(i=>i.status==='Resolved').length;

function getFiltered() {
  return allIncidents.filter(i => {
    if (currentFilter !== 'all' && i.status !== currentFilter) return false;
    if (searchTerm && !JSON.stringify(i).toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  });
}

function getStepForStatus(status) {
  const steps = ['Reported','Dispatched','Investigating','Resolved'];
  const current = {Active:0,Investigating:2,Resolved:3}[status] ?? 0;
  return {steps, current};
}

function render() {
  const list = getFiltered();
  const el = document.getElementById('incidentList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🛡️</div><h3>${searchTerm ? 'No matching incidents' : 'No incidents yet'}</h3><p>${searchTerm ? 'Try a different search term.' : 'That\'s a good sign — stay safe out there!'}</p></div>`;
    return;
  }
  el.innerHTML = list.slice().reverse().map((i, idx) => {
    const {steps, current} = getStepForStatus(i.status);
    const stepsHTML = steps.map((s, si) => {
      const cls = si < current ? 'done' : si === current ? 'current' : '';
      const icons = ['📝','📡','🔍','✅'];
      return `<div class="ts-step ${cls}"><div class="ts-circle">${icons[si]}</div><div class="ts-label">${s}</div></div>`;
    }).join('');
    return `
      <div class="inc-card">
        <div class="ic-header" onclick="toggleCard(${i.id})">
          <div>
            <div class="ic-type">${i.type}</div>
            <div class="ic-meta">
              <span>📍 ${i.location}</span>
              <span>🕐 ${new Date(i.createdAt).toLocaleDateString('en-IN')}</span>
              ${i.time ? `<span>⏰ ${i.time}</span>` : ''}
            </div>
          </div>
          <div class="ic-right">
            <span class="badge b-${(i.status||'active').toLowerCase()}">${i.status}</span>
            <span class="sev-chip sv-${i.severity || 'low'}">${(i.severity||'low').toUpperCase()}</span>
          </div>
        </div>
        <div class="ic-body" id="body-${i.id}">
          <div class="ic-desc">${i.description}</div>
          <div class="track-wrap">
            <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">Response Progress</div>
            <div class="track-steps">${stepsHTML}</div>
          </div>
          <div class="ic-chain">
            <div class="ic-chain-label">⛓️ Blockchain Record</div>
            <div class="ic-chain-hash">${i.txHash || '0x---'}</div>
            ${i.blockNum ? `<div class="ic-chain-hash" style="color:var(--muted);font-size:10px;margin-top:2px;">Block #${i.blockNum}</div>` : ''}
          </div>
          ${i.image ? `<img src="${i.image}" class="ic-photo">` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleCard(id) {
  const el = document.getElementById('body-' + id);
  el.classList.toggle('open');
}

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function doSearch(val) {
  searchTerm = val;
  render();
}

render();
</script>
</body>
</html>
